name: CIEMSub - Email Report

on:
  schedule:
    # 7am São Paulo = 10am UTC
    - cron: '0 10 * * *'
    # 12pm São Paulo = 3pm UTC
    - cron: '0 15 * * *'
    # 6pm São Paulo = 9pm UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
  # Fallback: dispara a cada 6h como backup (garante execução)
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ciemsub-report.yml'
  
jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
     PWDEBUG: "0"
     PLAYWRIGHT_BROWSERS_PATH: "0"
     DEBUG: "pw:api"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run report
        env:
          CIEM_USER: ${{ secrets.CIEM_USER }}
          CIEM_PASS: ${{ secrets.CIEM_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: npm run start

      - name: Upload screenshots (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ciemsub-screenshots
          path: output
          if-no-files-found: warn
          retention-days: 14
